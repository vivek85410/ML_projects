<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction | AI Tamasha</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);">

    <div style="width: 100%; max-width: 600px; padding: 40px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); margin: 20px;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.5rem; margin: 0; color: #39ff14; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(57, 255, 20, 0.3);">
                FWI Prediction
            </h1>
            <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">Enter parameters to let the AI do its <i>tamasha</i>.</p>
        </div>

        <form action="{{ url_for('predict_datapoint')}}" method="post" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            
            <input type="text" name="Temperature" placeholder="Temperature" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; transition: 0.3s;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="RH" placeholder="Relative Humidity (RH)" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="Ws" placeholder="Wind Speed (Ws)" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="Rain" placeholder="Rain" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="FFMC" placeholder="FFMC Index" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="DMC" placeholder="DMC Index" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="ISI" placeholder="ISI Index" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="Classes" placeholder="Classes" required style="grid-column: span 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">
            
            <input type="text" name="Region" placeholder="Region (0 or 1)" required style="grid-column: span 2; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none;" onfocus="this.style.borderColor='#39ff14'">

            <button type="submit" style="grid-column: span 2; margin-top: 10px; padding: 15px; background: #39ff14; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 5px 15px rgba(57, 255, 20, 0.4);" onmouseover="this.style.background='#2ecc12'; this.style.transform='translateY(-2px)';" onmouseout="this.style.background='#39ff14'; this.style.transform='translateY(0)';" >
                Calculate Prediction
            </button>
        </form>

        {% if result %}
        <div style="margin-top: 30px; padding: 20px; background: rgba(57, 255, 20, 0.1); border: 1px dashed #39ff14; border-radius: 12px; text-align: center; animation: fadeIn 0.5s ease-in;">
            <h2 style="margin: 0; font-size: 1rem; color: #888; text-transform: uppercase;">The FWI Prediction Result:</h2>
            <p style="margin: 10px 0 0 0; font-size: 2.2rem; color: #39ff14; font-weight: bold; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);">
                {{result}}
            </p>
        </div>
        {% endif %}


    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>


</body>
</html>
